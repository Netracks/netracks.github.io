<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            background: #f4f8fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .redirect-card {
            background: white;
            padding: 2rem 2.5rem;
            border-radius: 36px;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0eef3;
            border-top: 4px solid #0f4c5f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #b91c1c;
            background: #ffe6e6;
            padding: 0.8rem;
            border-radius: 60px;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        .success {
            color: #0f4c5f;
            background: #e0f0f5;
            padding: 0.8rem;
            border-radius: 60px;
            font-size: 0.9rem;
        }
        button {
            background: #0f4c5f;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: 500;
        }
        a {
            color: #0f4c5f;
        }
        .manual-link {
            word-break: break-all;
            background: #f0f4f8;
            padding: 0.5rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, get, update } from "firebase/database";

        document.addEventListener("DOMContentLoaded", () => {
            // 🔁 REPLACE WITH YOUR FIREBASE CONFIGURATION
                // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCx-yIgRBdqqaZm5mnCs6XicbJHqf442mQ",
  authDomain: "netrackers.firebaseapp.com",
  databaseURL: "https://netrackers-default-rtdb.firebaseio.com",
  projectId: "netrackers",
  storageBucket: "netrackers.firebasestorage.app",
  messagingSenderId: "362299470159",
  appId: "1:362299470159:web:dce2775a7c6fdd6970153a",
  measurementId: "G-FHJSFVG3RE"
};

            // Initialize Firebase
            let app;
            let db;
            try {
                app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                console.log("✅ Firebase initialized");
            } catch (err) {
                console.error("❌ Firebase init error:", err);
                document.getElementById('message').innerHTML = '<div class="error">🔥 Firebase config error. Check console.</div>';
                return;
            }

            const messageDiv = document.getElementById('message');
            const manualRedirectBtn = document.getElementById('manualRedirectBtn');
            const manualLinkSpan = document.getElementById('manualLink');

            const urlParams = new URLSearchParams(window.location.search);
            const linkId = urlParams.get('id');

            if (!linkId) {
                messageDiv.innerHTML = '<div class="error">❌ Missing link ID. Invalid tracking link.</div>';
                return;
            }

            const linkRef = ref(db, `links/${linkId}`);

            // Show a generic status while processing
            messageDiv.innerHTML = '<div>⏳ Fetching link data...</div>';

            // Get link data, then increment clicks and redirect
            get(linkRef)
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        messageDiv.innerHTML = '<div class="error">🔍 Link not found in database.</div>';
                        return;
                    }

                    const data = snapshot.val();
                    let destination = data.destinationUrl;

                    console.log("Destination URL from DB:", destination);

                    if (!destination) {
                        messageDiv.innerHTML = '<div class="error">⚠️ Destination URL is empty.</div>';
                        return;
                    }

                    // Fix missing protocol
                    if (!destination.startsWith('http://') && !destination.startsWith('https://')) {
                        destination = 'https://' + destination;
                        console.log("Added https://, new destination:", destination);
                    }

                    // Validate URL format
                    try {
                        new URL(destination);
                    } catch (e) {
                        console.error("Invalid URL format:", destination);
                        messageDiv.innerHTML = `<div class="error">❌ Invalid destination URL: ${destination}</div>`;
                        return;
                    }

                    // Increment click count (don't wait for this to finish)
                    update(linkRef, {
                        clickCount: (data.clickCount || 0) + 1
                    }).catch(err => console.warn("Click increment failed:", err));

                    // Show success message
                    messageDiv.innerHTML = `<div class="success">✅ Click recorded! Redirecting...</div>`;

                    // Provide a manual link in case redirect fails
                    manualLinkSpan.textContent = destination;
                    manualRedirectBtn.style.display = 'inline-block';
                    manualRedirectBtn.onclick = () => {
                        window.location.replace(destination);
                    };

                    // Redirect immediately
                    window.location.replace(destination);
                })
                .catch((error) => {
                    console.error("Error fetching link:", error);
                    messageDiv.innerHTML = `<div class="error">🔥 Failed to load link: ${error.message || 'Unknown error'}</div>`;
                });
        });
    </script>
</head>
<body>
    <div class="redirect-card">
        <h3>🔗 LinkTracker</h3>
        <div class="spinner"></div>
        <p>Processing your click...</p>
        <div id="message"></div>
        <div id="manualRedirect" style="margin-top: 1rem;">
            <button id="manualRedirectBtn" style="display: none;">➡️ Click here if not redirected</button>
            <div class="manual-link" style="display: none;" id="manualLinkContainer">
                Or go directly: <span id="manualLink"></span>
            </div>
        </div>
        <small style="display: block; margin-top: 1rem;">⚡ <a href="/">Go to dashboard</a></small>
    </div>
</body>
</html>
