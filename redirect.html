<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    document.addEventListener("DOMContentLoaded", async () => {
        // 🔁 YOUR FIREBASE CONFIGURATION (replace with your own)
        const firebaseConfig = {
            apiKey: "AIzaSyCx-yIgRBdqqaZm5mnCs6XicbJHqf442mQ",
            authDomain: "netrackers.firebaseapp.com",
            databaseURL: "https://netrackers-default-rtdb.firebaseio.com",
            projectId: "netrackers",
            storageBucket: "netrackers.firebasestorage.app",
            messagingSenderId: "362299470159",
            appId: "1:362299470159:web:dce2775a7c6fdd6970153a",
            measurementId: "G-FHJSFVG3RE"
        };

        // Initialize Firebase
        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log("✅ Firebase initialized");
        } catch (err) {
            console.error("❌ Firebase init error:", err);
            document.getElementById('message').innerHTML = '<div class="error">🔥 Firebase config error.</div>';
            return;
        }

        const messageDiv = document.getElementById('message');
        const urlParams = new URLSearchParams(window.location.search);
        const linkId = urlParams.get('id');

        if (!linkId) {
            messageDiv.innerHTML = '<div class="error">❌ Missing link ID.</div>';
            return;
        }

        // We don't know the uid yet – first fetch the link to get its uid
        // But we need to know where to look. We'll need to search for the link across all users?
        // Better: store the uid in the link itself, and use a global link index.
        // However, for simplicity, we can query the global links collection? But we want per-user.
        // The recommended approach: create a global "links" index that maps linkId to { uid, linkId }.
        // But that adds complexity. Instead, we'll assume the linkId is unique and store it under a global "links" collection that just points to the user.
        // Actually, we can store the link under users/{uid}/links/{linkId} and also keep a global reference.
        // The simplest: when a link is created, also create an entry under "globalLinks/{linkId}" that stores the uid.
        // But we haven't done that. For now, let's read the link by searching all users? That would be inefficient.
        // Better: modify the tracking URL to include the uid: e.g., redirect.html?id=xxx&uid=yyy
        // But that would expose the uid. Alternatively, we can embed the uid in the link ID itself (like a composite key).
        // Given the user's instruction, they want to store uid inside the link document, and then redirect.html fetches that link from a known path.
        // But to fetch the link, we need to know the user's path. So we must have a way to locate it.
        // The typical solution: keep a global "links" collection that maps linkId to { uid, ... }.
        // Let's implement that: when creating a link, also write to a global "linkIndex/{linkId}" with the uid and maybe the link path.
        // Then in redirect.html, first look up the link in the global index to get the uid, then fetch the full link data from the user's subpath.

        // We'll modify app.js to also write to a global index, and redirect.html will use that index.
        // But to keep this answer concise, I'll assume the linkId includes the uid as a prefix, or we use a global index as described.
        // However, the user's instruction says: "Store uid inside each link" and then "After fetching link, get uid from data". But fetching the link requires knowing the path. So we need a global lookup.

        // I'll provide a solution with a global "linkIndex" that stores { uid, ... }.
        // Update app.js to write to linkIndex, and redirect.html to use it.
        // Let's implement that.

        // For now, let's assume we have a global index.
        // We'll update the code accordingly.

        // Get the link from global index to find the owner
        const indexRef = ref(db, `linkIndex/${linkId}`);
        const indexSnapshot = await get(indexRef);
        if (!indexSnapshot.exists()) {
            messageDiv.innerHTML = '<div class="error">🔍 Link not found.</div>';
            return;
        }

        const { uid } = indexSnapshot.val();
        if (!uid) {
            messageDiv.innerHTML = '<div class="error">🔍 Invalid link.</div>';
            return;
        }

        // Now get the full link data from the user's subpath
        const linkRef = ref(db, `users/${uid}/links/${linkId}`);
        const linkSnapshot = await get(linkRef);
        if (!linkSnapshot.exists()) {
            messageDiv.innerHTML = '<div class="error">🔍 Link data missing.</div>';
            return;
        }

        const linkData = linkSnapshot.val();
        let destination = linkData.destinationUrl;

        if (!destination) {
            messageDiv.innerHTML = '<div class="error">⚠️ Destination URL is empty.</div>';
            return;
        }

        // Fix URL protocol
        if (!destination.startsWith('http://') && !destination.startsWith('https://')) {
            destination = 'https://' + destination;
        }

        // Validate URL
        try {
            new URL(destination);
        } catch (e) {
            messageDiv.innerHTML = `<div class="error">❌ Invalid URL: ${destination}</div>`;
            return;
        }

        // Collect visitor data (non‑blocking)
        const userAgent = navigator.userAgent;
        const platform = navigator.platform;
        const referrer = document.referrer || "Direct";
        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(userAgent);
        const isAndroid = /Android/i.test(userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(userAgent);
        const isChrome = /Chrome/i.test(userAgent) && !/Edg/i.test(userAgent);
        const isFirefox = /Firefox/i.test(userAgent);
        const isSafari = /Safari/i.test(userAgent) && !/Chrome/i.test(userAgent);

        let source = "Direct";
        if (referrer.includes("whatsapp")) source = "WhatsApp";
        else if (referrer.includes("google")) source = "Google";
        else if (referrer.includes("facebook") || referrer.includes("fb.com")) source = "Facebook";
        else if (referrer.includes("twitter")) source = "Twitter";
        else if (referrer.includes("instagram")) source = "Instagram";
        else if (referrer.includes("linkedin")) source = "LinkedIn";
        else if (referrer.includes("telegram")) source = "Telegram";
        else if (referrer !== "Direct") source = "Other";

        const screenSize = { width: screen.width, height: screen.height };

        // Fetch geo data in background
        let locationData = {};
        const geoPromise = fetch("https://ipapi.co/json/")
            .then(res => res.ok ? res.json() : {})
            .catch(err => { console.warn("GeoIP failed:", err); return {}; });

        // Prepare visit data after geo resolves
        geoPromise.then(loc => {
            const visitData = {
                ip: loc.ip || "hidden",
                country: loc.country_name || "unknown",
                city: loc.city || "unknown",
                region: loc.region || "unknown",
                isp: loc.org || "unknown",
                latitude: loc.latitude || null,
                longitude: loc.longitude || null,
                userAgent: userAgent.slice(0, 120),
                os: platform,
                referrer: referrer,
                source: source,
                device: isMobile ? "Mobile" : "Desktop",
                deviceType: isMobile ? (isAndroid ? "Android" : isIOS ? "iOS" : "Mobile") : "Desktop",
                browserName: isChrome ? "Chrome" : isFirefox ? "Firefox" : isSafari ? "Safari" : "Other",
                screen: screenSize,
                timestamp: new Date().toISOString()
            };

            // Save visit under user's path
            const visitsRef = ref(db, `users/${uid}/links/${linkId}/visits`);
            const newVisitRef = push(visitsRef);
            update(newVisitRef, visitData)
                .then(() => console.log("✅ Visit saved"))
                .catch(err => console.warn("Visit save failed:", err));

            // Increment click count
            update(linkRef, { clickCount: (linkData.clickCount || 0) + 1 })
                .catch(err => console.warn("Click increment failed:", err));
        });

        // Redirect immediately (non‑blocking)
        messageDiv.innerHTML = '<div class="success">✅ Redirecting...</div>';
        setTimeout(() => window.location.replace(destination), 150);
    });
</script>
